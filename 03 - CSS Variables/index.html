<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css-Variable</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Update CSS Variables with <span class='hl'>JS</span></h2>
    <p class="subtitle">Upload your own image, tune the filters, then download the edited version.</p>

    <div class="actions">
        <label class="upload-button" for="image-upload">Upload Image</label>
        <input id="image-upload" type="file" accept="image/*">
        <button id="download-btn" class="download-button" type="button">Download Edited Image</button>
    </div>

    <div class="controls">
        <div class="control">
            <label for="border">Border</label>
            <input id="border" type="range" name="border" min="0" max="200" value="2" data-sizing="px">
            <span class="value" id="border-value">2px</span>
        </div>

        <div class="control">
            <label for="blur">Blur</label>
            <input id="blur" type="range" name="blur" min="0" max="25" value="0" data-sizing="px">
            <span class="value" id="blur-value">0px</span>
        </div>

        <div class="control">
            <label for="base">Base Color</label>
            <input id="base" type="color" name="base" value="#ffc600">
        </div>

        <div class="control">
            <label for="brightness">Brightness</label>
            <input id="brightness" type="range" name="brightness" min="0" max="200" value="100" data-sizing="%">
            <span class="value" id="brightness-value">100%</span>
        </div>

        <div class="control">
            <label for="contrast">Contrast</label>
            <input id="contrast" type="range" name="contrast" min="0" max="200" value="100" data-sizing="%">
            <span class="value" id="contrast-value">100%</span>
        </div>

        <div class="control">
            <label for="saturate">Saturation</label>
            <input id="saturate" type="range" name="saturate" min="0" max="200" value="100" data-sizing="%">
            <span class="value" id="saturate-value">100%</span>
        </div>

        <div class="control">
            <label for="invert">Invert</label>
            <input id="invert" type="range" name="invert" min="0" max="100" value="0" data-sizing="%">
            <span class="value" id="invert-value">0%</span>
        </div>

        <div class="control">
            <label for="grayscale">Grayscale</label>
            <input id="grayscale" type="range" name="grayscale" min="0" max="100" value="0" data-sizing="%">
            <span class="value" id="grayscale-value">0%</span>
        </div>

    </div>
    <div class="preview-wrap">
        <img id="preview-image" width="500" height="400" crossorigin="anonymous"
            src="https://images.unsplash.com/photo-1774624513295-a0bac2eb4661?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Edited preview">
    </div>
    <script src="script.js"></script>
</body>

</html>
